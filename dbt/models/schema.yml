version: 2

sources:
  - name: raw
    schema: raw
    tables:
      - name: ipo_events
        description: "Raw IPO events ingested from Finnhub"

      - name: daily_prices
        description: "Raw daily prices ingested from Alpha Vantage (and potentially other sources later)"

      - name: symbol_map
        description: "Mapping between Finnhub IPO symbols and vendor-specific pricing symbols"

      - name: company_profiles
        description: "Company profile enrichment from Finnhub (industry, exchange, etc.)"

      - name: ingestion_runs
        description: "Run log for ingestion executions"

models:
  - name: stg_ipos_recent
    description: "Recent IPO events with symbol mapping and preferred company profile (finnhub -> yahoo)"
    columns:
      - name: event_id
        tests: [not_null, unique]

      - name: ipo_date
        tests: [not_null]

      - name: ipo_symbol
        tests: [not_null]

      - name: price_symbol
        tests:
          - not_null:
              config:
                severity: warn

      - name: industry
        tests:
          - not_null:
              config:
                severity: warn

      - name: sector
        tests:
          - not_null:
              config:
                severity: warn

  - name: stg_prices_ipo_window_100d
    description: "Daily prices aligned to IPO date for 0..N day window; prefers alphavantage then yahoo"
    columns:
      - name: event_id
        tests: [not_null]

      - name: price_date
        tests: [not_null]

      - name: close
        tests:
          - not_null:
              config:
                severity: warn

      - name: price_source
        tests: [not_null]

  - name: ipo_metrics_100d
    description: "Per-IPO metrics over first 100 trading days"
    columns:
      - name: event_id
        tests: [not_null, unique]
        
      - name: ipo_date
        tests: [not_null]
